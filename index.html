<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movify</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header>
        <div class="container">
            <nav>
                <div class="nav__logo">
                
                        <img class="nav__logo-img" src="./assets/Movify.svg" alt="">
                    
                </div>
                <ul class="nav__links">
                    <li class="nav__item">
                        <a class="nav__link nav__link--home" href="#">Home</a>
                    </li>

                    <li class="nav__item">
                        <a class="nav__link nav__link--car" href="#">Discover Movies</a>
                    </li>

                    <li class="nav__item">
                        <a class="nav__link nav__link--contact" href="#">Contact</a>
                    </li>
                </ul>
            </nav>
    </header>
    <main>
        <section id="landing">

            <div class="landing__content">

                <h1 class="landing__title">Discover the world's most popular movies</h1>
                <h2 class="landing__sub-title">Find Your Next Movie With <span class="purple">Movify</span></h2>

                <div class="search">
                    <input type="text" placeholder="Search movies, actors or Keywords">
                    <button class="search__btn">
                        <i class="fa-solid fa-magnifying-glass"></i>
                    </button>
                </div>
            </div>
            <div class="hero__scene">
                <div class="scene">

                    <img class="landing__img" src="./assets/building.681ea6bf.png" alt="">
                    
                </div>
            </div>
            </div>
        </section>
    </main>

    <footer class="footer">
        <div class="footer__container">
            <h3>Movify</h3>
            <p>ⓒ 2026 Movify. All rights reserved.</p>
            <div class="footer__links">
                <a href="#">Home</a>
                <a href="#">Discover</a>
                <a href="#">Contact</a>

            </div>

        </div>
    </footer>

    <script src="script.js"></script>
</body>

</html>
